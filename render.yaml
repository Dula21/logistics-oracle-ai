services:
  - type: web
    name: oracle-logistics-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false          # You paste this manually in Render dashboard
      - key: LLM_MODEL_NAME
        value: llama-3.1-8b-instant
      - key: DATA_SOURCE_PATH
        value: historic_sales.csv
      - key: PYTHON_VERSION
        value: 3.11.0